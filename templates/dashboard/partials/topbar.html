        {% endblock %}

<!-- 芒鈥濃偓芒鈥濃偓 Right area 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓 -->
<div class="flex items-center gap-1">

    {% block page_actions %}{% endblock %}

    <!-- Notification bell -->
    <button type="button"
            class="flex h-9 w-9 items-center justify-center rounded-lg
                   text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition"
            aria-label="Notifications">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.75"
             stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
    </button>

    <!-- Avatar / user menu -->
    <div class="relative" id="user-menu-wrap">
        <button type="button"
                id="user-menu-btn"
                class="flex h-9 w-9 items-center justify-center rounded-full
                       bg-blue-700 text-[11px] font-bold text-white uppercase
                       hover:bg-blue-800 transition select-none"
                aria-label="Menu utilisateur">
            {{ user.get_full_name|default:user.email|slice:":2"|upper }}
        </button>
        <div id="user-dropdown"
             class="absolute right-0 top-11 z-50 hidden w-52 rounded-xl
                    border border-slate-200 bg-white py-1 shadow-xl shadow-slate-200/50">
            <div class="border-b border-slate-100 px-4 py-2.5">
                <p class="text-sm font-semibold text-slate-800 truncate">
                    {{ user.get_full_name|default:user.username }}
                </p>
                <p class="text-xs text-slate-400 truncate">{{ user.email }}</p>
            </div>
            <div class="py-1">
                <a href="{% url 'accounts:logout' %}"
                   class="flex items-center gap-2.5 px-4 py-2 text-sm
                          text-rose-600 hover:bg-rose-50 transition">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" x2="9" y1="12" y2="12"/>
                    </svg>
                    D茅connexion
                </a>
            </div>
        </div>
    </div>

</div>

<script>
(function () {
    var btn  = document.getElementById('user-menu-btn');
    var drop = document.getElementById('user-dropdown');
    var wrap = document.getElementById('user-menu-wrap');
    if (!btn || !drop) return;
    btn.addEventListener('click', function (e) {
        e.stopPropagation();
        drop.classList.toggle('hidden');
    });
    document.addEventListener('click', function (e) {
        if (!wrap.contains(e.target)) drop.classList.add('hidden');
    });
})();
</script>
